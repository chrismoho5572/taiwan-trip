<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{FLAG}} {{DESTINATION}} Trip | {{DATES}}</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Hero Section -->
    <header class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <span class="flag">{{FLAG}}</span>
            <h1>{{DESTINATION}} Trip {{YEAR}}</h1>
            <p class="subtitle">{{DURATION}} | {{WHO}}</p>
            <p class="dates">📅 {{DATES}}</p>
            <div class="weather-badge">
                <span id="current-time"></span>
                <span class="divider">|</span>
                <span id="weather">{{WEATHER}}</span>
            </div>
        </div>
    </header>

    <!-- Day Navigation -->
    <nav class="day-nav" id="day-nav">
        <!-- Generated by JavaScript -->
    </nav>

    <!-- Main Content -->
    <main class="container">
        <!-- Day Content -->
        <section id="day-content" class="day-section">
            <!-- Generated by JavaScript -->
        </section>

        <!-- Filter Section -->
        <section class="filter-section">
            <h2>🔍 ค้นหาสถานที่</h2>
            <div class="filter-buttons" id="filter-buttons">
                <!-- Generated by JavaScript -->
            </div>
        </section>

        <!-- Places Grid -->
        <section id="places-grid" class="places-section">
            <!-- Generated by JavaScript -->
        </section>
    </main>

    <!-- Photo Spot Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div class="modal-body">
                <!-- Generated by JavaScript -->
            </div>
        </div>
    </div>

    <footer>
        <p>Made with 🌿 by Moss | {{DESTINATION}} Trip {{YEAR}}</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
