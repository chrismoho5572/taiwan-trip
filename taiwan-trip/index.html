<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇹🇼 Taiwan Trip | 10-15 เมษายน 2026</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Hero Section -->
    <header class="hero">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <span class="flag">🇹🇼</span>
            <h1>Taiwan Trip 2026</h1>
            <p class="subtitle">💕 5 วัน 4 คืน | ทริปในฝันของเรา</p>
            <p class="dates">📅 10-15 เมษายน 2026</p>
            <p class="love-note">สำหรับภรรยาที่น่ารักที่สุดในโลก 💕</p>
            <div class="weather-badge">
                <span id="current-time"></span>
                <span class="divider">|</span>
                <span id="taipei-temp">22°C</span>
            </div>
        </div>
    </header>

    <!-- Day Navigation -->
    <nav class="day-nav">
        <button class="day-tab active" data-day="1">
            <span class="day-num">01</span>
            <span class="day-label">วันแรก</span>
        </button>
        <button class="day-tab" data-day="2">
            <span class="day-num">02</span>
            <span class="day-label">Jiufen</span>
        </button>
        <button class="day-tab" data-day="3">
            <span class="day-num">03</span>
            <span class="day-label">City</span>
        </button>
        <button class="day-tab" data-day="4">
            <span class="day-num">04</span>
            <span class="day-label">Day Trip</span>
        </button>
        <button class="day-tab" data-day="5">
            <span class="day-num">05</span>
            <span class="day-label">กลับ</span>
        </button>
    </nav>

    <!-- Love Message -->
    <section class="love-intro">
        <div class="container">
            <h2>💕 ทริปครั้งนี้เพื่อเธอ</h2>
            <p>เดินทางไปด้วยกัน กินอร่อยไปด้วยกัน ถ่ายรูปสวยๆ ไปด้วยกัน</p>
            <p class="love-quote">"ทุกที่ที่ไป ขอให้มีเธอข้างกาย" 💑</p>
        </div>
    </section>

    <!-- Main Content -->
    <main class="container">
        <!-- Day Content -->
        <section id="day-content" class="day-section">
            <!-- โหลดจาก JS -->
        </section>

        <!-- Filter Section -->
        <section class="filter-section">
            <h2>🔍 ค้นหาสถานที่</h2>
            <div class="filter-buttons">
                <button class="filter-btn active" data-type="all">
                    <span class="icon">📍</span>
                    <span>ทั้งหมด</span>
                </button>
                <button class="filter-btn" data-type="attraction">
                    <span class="icon">📷</span>
                    <span>สถานที่</span>
                </button>
                <button class="filter-btn" data-type="food">
                    <span class="icon">🍜</span>
                    <span>อาหาร</span>
                </button>
                <button class="filter-btn" data-type="restaurant">
                    <span class="icon">🍽️</span>
                    <span>ร้านอาหาร</span>
                </button>
                <button class="filter-btn" data-type="shopping">
                    <span class="icon">🛒</span>
                    <span>ช้อปปิ้ง</span>
                </button>
                <button class="filter-btn" data-type="night_market">
                    <span class="icon">🌙</span>
                    <span>ตลาดกลางคืน</span>
                </button>
            </div>
        </section>

        <!-- Places Grid -->
        <section id="places-grid" class="places-section">
            <!-- โหลดจาก JS -->
        </section>
    </main>

    <!-- Photo Spot Modal -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div class="modal-body">
                <!-- โหลดจาก JS -->
            </div>
        </div>
    </div>

    <footer>
        <p>Made with 🌿 by Moss | Taiwan Trip 2026</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
