<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇹🇼 Taiwan Trip | 10-15 เมษายน 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🇹🇼 Taiwan Trip</h1>
        <p class="subtitle">นายท่าน + ภรรยา | 10-15 เมษายน 2026</p>
        <div class="weather">
            <span id="current-time"></span>
            <span id="taipei-temp"></span>
        </div>
    </header>

    <nav>
        <button class="tab active" data-day="1">Day 1</button>
        <button class="tab" data-day="2">Day 2</button>
        <button class="tab" data-day="3">Day 3</button>
        <button class="tab" data-day="4">Day 4</button>
        <button class="tab" data-day="5">Day 5</button>
    </nav>

    <main id="content">
        <!-- โหลดจาก JavaScript -->
    </main>

    <section id="places-list">
        <h2>📍 สถานที่ทั้งหมด</h2>
        <div class="filter">
            <button class="filter-btn active" data-type="all">ทั้งหมด</button>
            <button class="filter-btn" data-type="food">🍜 อาหาร</button>
            <button class="filter-btn" data-type="restaurant">🍽️ ร้านอาหาร</button>
            <button class="filter-btn" data-type="shopping">🛒 ช้อปปิ้ง</button>
            <button class="filter-btn" data-type="attraction">📷 สถานที่</button>
            <button class="filter-btn" data-type="night_market">🌙 ตลาดกลางคืน</button>
        </div>
        <div id="places-container">
            <!-- โหลดจาก JavaScript -->
        </div>
    </section>

    <footer>
        <p>Made with 🌿 by Moss | 2026</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
